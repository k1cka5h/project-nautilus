<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nautilus Documentation</title>
  <meta name="description" content="Complete reference documentation for the Nautilus self-service Azure IaC platform." />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11/styles/github-dark-dimmed.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --teal:      #00c4cc;
      --teal-dim:  #008c94;
      --teal-dark: #00565c;
      --bg:        #0b1219;
      --bg2:       #111c26;
      --bg3:       #172333;
      --border:    #1e3040;
      --text:      #c9d8e3;
      --muted:     #6b8899;
      --white:     #eef4f8;
      --green:     #3dd68c;
      --yellow:    #e8b93c;
      --radius:    8px;
      --sidebar-w: 280px;
      --nav-h:     56px;
      --font:      -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      --mono:      "SF Mono", "Fira Code", "Cascadia Code", Consolas, monospace;
    }

    html { scroll-behavior: smooth; scroll-padding-top: calc(var(--nav-h) + 1.5rem); }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
    }

    a { color: var(--teal); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ── Top nav ── */
    .topnav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 200;
      display: flex; align-items: center; justify-content: space-between;
      height: var(--nav-h); padding: 0 1.5rem;
      background: rgba(11, 18, 25, 0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }

    .topnav-brand {
      display: flex; align-items: center; gap: 0.5rem;
      font-weight: 700; font-size: 1rem; color: var(--white);
      text-decoration: none;
    }
    .topnav-brand:hover { text-decoration: none; }

    .topnav-links { display: flex; gap: 1.25rem; list-style: none; font-size: 0.85rem; }
    .topnav-links a { color: var(--muted); }
    .topnav-links a:hover { color: var(--white); text-decoration: none; }
    .topnav-links a.active { color: var(--teal); }

    .menu-toggle {
      display: none; background: none; border: 1px solid var(--border);
      color: var(--text); padding: 0.3rem 0.6rem; border-radius: 4px;
      font-size: 1.1rem; cursor: pointer;
    }

    /* ── Layout ── */
    .layout {
      display: flex;
      margin-top: var(--nav-h);
      min-height: calc(100vh - var(--nav-h));
    }

    /* ── Sidebar ── */
    .sidebar {
      position: fixed; top: var(--nav-h); left: 0; bottom: 0;
      width: var(--sidebar-w);
      background: var(--bg2);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 1.25rem 0;
      z-index: 100;
    }

    .sidebar-section {
      padding: 0 1.25rem;
      margin-bottom: 0.25rem;
    }

    .sidebar-heading {
      font-size: 0.7rem; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--muted);
      padding: 0.75rem 0 0.4rem;
    }

    .sidebar a {
      display: block; padding: 0.35rem 1.25rem;
      font-size: 0.88rem; color: var(--text);
      border-left: 2px solid transparent;
      transition: all 0.12s;
    }
    .sidebar a:hover {
      color: var(--white); background: rgba(0,196,204,0.05);
      text-decoration: none;
    }
    .sidebar a.active {
      color: var(--teal); border-left-color: var(--teal);
      background: rgba(0,196,204,0.08);
    }

    /* ── Content ── */
    .content {
      margin-left: var(--sidebar-w);
      flex: 1;
      max-width: 820px;
      padding: 2.5rem 3rem 4rem;
    }

    /* ── Markdown rendered styles ── */
    .content h1 {
      font-size: 2rem; font-weight: 800; color: var(--white);
      margin: 0 0 0.75rem; letter-spacing: -0.02em;
      padding-bottom: 0.75rem; border-bottom: 1px solid var(--border);
    }

    .content h2 {
      font-size: 1.4rem; font-weight: 700; color: var(--white);
      margin: 2.5rem 0 0.75rem; letter-spacing: -0.01em;
      padding-bottom: 0.5rem; border-bottom: 1px solid var(--border);
    }

    .content h3 {
      font-size: 1.1rem; font-weight: 600; color: var(--white);
      margin: 2rem 0 0.5rem;
    }

    .content h4 {
      font-size: 0.95rem; font-weight: 600; color: var(--white);
      margin: 1.5rem 0 0.4rem;
    }

    .content p { margin: 0 0 1rem; }

    .content ul, .content ol {
      margin: 0 0 1rem; padding-left: 1.5rem;
    }
    .content li { margin-bottom: 0.3rem; }
    .content li > ul, .content li > ol { margin-top: 0.3rem; margin-bottom: 0; }

    .content strong { color: var(--white); }

    .content code {
      font-family: var(--mono); font-size: 0.85em;
      background: var(--bg3); padding: 0.15em 0.4em;
      border-radius: 4px; color: var(--teal);
    }

    .content pre {
      margin: 0 0 1.25rem;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow-x: auto;
      padding: 1rem 1.25rem;
      line-height: 1.55;
    }
    .content pre code {
      background: none; padding: 0; color: var(--text);
      font-size: 0.82rem;
    }

    .content blockquote {
      margin: 0 0 1rem;
      padding: 0.75rem 1rem;
      border-left: 3px solid var(--teal-dark);
      background: rgba(0,196,204,0.05);
      border-radius: 0 var(--radius) var(--radius) 0;
    }
    .content blockquote p:last-child { margin-bottom: 0; }

    .content table {
      width: 100%; margin: 0 0 1.25rem;
      border-collapse: collapse;
      font-size: 0.88rem;
    }
    .content th {
      text-align: left; font-weight: 600; color: var(--white);
      padding: 0.6rem 0.75rem;
      background: var(--bg3);
      border-bottom: 2px solid var(--border);
    }
    .content td {
      padding: 0.5rem 0.75rem;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }
    .content tr:hover td { background: rgba(0,196,204,0.03); }

    .content hr {
      border: none; border-top: 1px solid var(--border);
      margin: 2rem 0;
    }

    .content img { max-width: 100%; border-radius: var(--radius); }

    /* ── Loading state ── */
    .loading {
      display: flex; align-items: center; justify-content: center;
      height: 40vh; color: var(--muted); font-size: 0.95rem;
    }

    /* ── Responsive ── */
    @media (max-width: 900px) {
      .sidebar {
        transform: translateX(-100%);
        transition: transform 0.2s;
        width: 280px;
      }
      .sidebar.open { transform: translateX(0); }
      .content { margin-left: 0; padding: 2rem 1.5rem 3rem; }
      .menu-toggle { display: block; }
    }
  </style>
</head>
<body>

<!-- ── Top nav ── -->
<nav class="topnav">
  <div style="display:flex; align-items:center; gap:1rem;">
    <button class="menu-toggle" onclick="toggleSidebar()" aria-label="Toggle menu">&#9776;</button>
    <a class="topnav-brand" href="index.html">&#x1F41A; Nautilus</a>
  </div>
  <ul class="topnav-links">
    <li><a href="#home">Home</a></li>
    <li><a href="https://github.com/nautilus/project-nautilus">GitHub</a></li>
  </ul>
</nav>

<!-- ── Layout ── -->
<div class="layout">

  <!-- ── Sidebar ── -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-heading">Getting started</div>
    </div>
    <a href="#home" data-page="home">Home</a>
    <a href="#architecture-overview" data-page="architecture-overview">Architecture overview</a>
    <a href="#bootstrap" data-page="bootstrap">Azure bootstrap</a>
    <a href="#repository-setup" data-page="repository-setup">Repository setup</a>

    <div class="sidebar-section">
      <div class="sidebar-heading">Product teams</div>
    </div>
    <a href="#developer-guide" data-page="developer-guide">Developer guide</a>

    <div class="sidebar-section">
      <div class="sidebar-heading">Platform team</div>
    </div>
    <a href="#platform-module-maintenance" data-page="platform-module-maintenance">Module maintenance</a>
    <a href="#platform-product-maintenance" data-page="platform-product-maintenance">Product team support</a>
  </aside>

  <!-- ── Content ── -->
  <main class="content" id="content">
    <div class="loading">Loading documentation...</div>
  </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/marked@15/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11/highlight.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11/languages/bash.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11/languages/python.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11/languages/typescript.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11/languages/go.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11/languages/java.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11/languages/csharp.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11/languages/json.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11/languages/xml.min.js"></script>
<script>
  const PAGES = [
    "home",
    "architecture-overview",
    "bootstrap",
    "developer-guide",
    "platform-module-maintenance",
    "platform-product-maintenance",
    "repository-setup",
  ];

  const contentEl = document.getElementById("content");
  const sidebar   = document.getElementById("sidebar");
  const cache     = {};

  // Configure marked with highlight.js
  marked.setOptions({
    highlight(code, lang) {
      if (lang && hljs.getLanguage(lang)) {
        return hljs.highlight(code, { language: lang }).value;
      }
      return hljs.highlightAuto(code).value;
    },
    breaks: false,
    gfm: true,
  });

  async function loadPage(page) {
    // Update sidebar active state
    sidebar.querySelectorAll("a").forEach(a => {
      a.classList.toggle("active", a.dataset.page === page);
    });

    // Show loading if not cached
    if (!cache[page]) {
      contentEl.innerHTML = '<div class="loading">Loading...</div>';
    }

    try {
      if (!cache[page]) {
        const res = await fetch(`content/${page}.md`);
        if (!res.ok) throw new Error(`${res.status}`);
        cache[page] = await res.text();
      }

      contentEl.innerHTML = marked.parse(cache[page]);

      // Apply syntax highlighting to any unhighlighted blocks
      contentEl.querySelectorAll("pre code:not(.hljs)").forEach(el => {
        hljs.highlightElement(el);
      });

      // Scroll to top of content
      window.scrollTo({ top: 0 });

      // Update page title
      const h1 = contentEl.querySelector("h1");
      document.title = h1
        ? `${h1.textContent} — Nautilus Docs`
        : "Nautilus Documentation";

    } catch (err) {
      contentEl.innerHTML = `
        <h1>Page not found</h1>
        <p>Could not load <code>${page}.md</code>.</p>
        <p><a href="#home">Go to home page</a></p>
      `;
    }

    // Close sidebar on mobile after navigation
    sidebar.classList.remove("open");
  }

  function toggleSidebar() {
    sidebar.classList.toggle("open");
  }

  // Close sidebar when clicking outside on mobile
  document.addEventListener("click", (e) => {
    if (window.innerWidth <= 900 &&
        !sidebar.contains(e.target) &&
        !e.target.classList.contains("menu-toggle")) {
      sidebar.classList.remove("open");
    }
  });

  // Handle sidebar link clicks
  sidebar.addEventListener("click", (e) => {
    const link = e.target.closest("a[data-page]");
    if (!link) return;
    e.preventDefault();
    const page = link.dataset.page;
    window.location.hash = page;
  });

  // Handle hash changes
  function onHashChange() {
    let page = window.location.hash.replace("#", "") || "home";
    if (!PAGES.includes(page)) page = "home";
    loadPage(page);
  }

  window.addEventListener("hashchange", onHashChange);
  onHashChange();
</script>

</body>
</html>
