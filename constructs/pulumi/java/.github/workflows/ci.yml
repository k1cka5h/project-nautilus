name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags: ["v*.*.*"]

jobs:
  test:
    name: mvn test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: maven

      - name: Test
        run: mvn test --batch-mode

  publish:
    name: Publish to internal Maven
    runs-on: ubuntu-latest
    needs: test
    if: github.ref_type == 'tag'
    environment: registry

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: maven
          server-id: nautilus-internal
          server-username: MAVEN_USERNAME
          server-password: MAVEN_TOKEN

      - name: Verify tag matches package version
        run: |
          POM_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          TAG_VERSION="${{ github.ref_name }}"
          if [ "v${POM_VERSION}" != "${TAG_VERSION}" ]; then
            echo "Tag ${TAG_VERSION} does not match pom.xml version v${POM_VERSION}"
            exit 1
          fi

      - name: Publish
        env:
          MAVEN_USERNAME: ci
          MAVEN_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
        run: mvn deploy --batch-mode -DskipTests
