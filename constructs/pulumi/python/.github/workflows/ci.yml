name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags: ["v*.*.*"]

jobs:
  test:
    name: pytest
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: pip install -e ".[dev]"

      - name: Test
        run: pytest tests/ -v --tb=short

  publish:
    name: Publish to internal PyPI
    runs-on: ubuntu-latest
    needs: test
    if: github.ref_type == 'tag'
    environment: registry

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify tag matches package version
        run: |
          PKG_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          TAG_VERSION="${{ github.ref_name }}"
          if [ "v${PKG_VERSION}" != "${TAG_VERSION}" ]; then
            echo "Tag ${TAG_VERSION} does not match package version v${PKG_VERSION}"
            exit 1
          fi

      - name: Build
        run: |
          pip install build
          python -m build

      - name: Publish
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.REGISTRY_TOKEN }}
        run: |
          pip install twine
          twine upload --repository-url https://pkgs.nautilus.internal/simple/ dist/*
