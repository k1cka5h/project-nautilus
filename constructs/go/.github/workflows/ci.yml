name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags: ["v*.*.*"]

jobs:
  test:
    name: go test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Test
        run: go test ./... -v -count=1

  publish:
    name: Publish to internal Go proxy
    runs-on: ubuntu-latest
    needs: test
    if: github.ref_type == 'tag'
    environment: registry

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Warm proxy cache
        # The internal Athens proxy fetches from the VCS on first request.
        # Requesting the new version here ensures it is available immediately
        # rather than on the first consumer pull.
        env:
          GONOSUMCHECK: "*"
          GONOSUMDB: "*"
          GONOPROXY: ""
        run: |
          MODULE=$(go list -m)
          VERSION="${{ github.ref_name }}"
          curl --fail --silent \
            --header "Authorization: Bearer ${{ secrets.REGISTRY_TOKEN }}" \
            "https://goproxy.k1cka5h.internal/${MODULE}/@v/${VERSION}.info"
